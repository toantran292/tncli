name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            os: macos-latest
            name: tncli-darwin-arm64
          - goos: darwin
            goarch: amd64
            os: macos-latest
            name: tncli-darwin-amd64
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            name: tncli-linux-amd64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            name: tncli-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags "-s -w" -o ${{ matrix.name }} ./cmd/tncli/
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Sign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force --options runtime ${{ matrix.name }}

      - name: Package
        run: |
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            checksums.txt
          generate_release_notes: true
